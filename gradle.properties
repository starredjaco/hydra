android.useAndroidX=true
org.gradle.jvmargs=-Xmx2048m
android.nonTransitiveRClass=true
# Provide the runtime AAR ourselves from libs/ (flatDir) instead of the plugin
# auto-resolving a Maven coordinate. Read at plugin-apply time (the DSL flag would
# be set too late, after the plugin already wired the dependency).
deviceintelligence.disableAutoRuntimeDependency=true
