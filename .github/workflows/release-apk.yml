name: Release APK

# When a GitHub Release is published, build the RASP-protected sample APK and
# attach it to that release. Also runnable manually (uploads as an artifact).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform
        run: sdkmanager "platform-tools" "platforms;android-36"

      - name: Generate debug keystore
        # The sample's `demo` signingConfig re-signs the instrumented APK with the
        # standard Android debug keystore. CI runners don't have one, so create it
        # deterministically (alias/passwords match sample/build.gradle.kts).
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :sample:assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        id: stage
        run: |
          mkdir -p dist
          TAG="${{ github.event.release.tag_name || github.sha }}"
          OUT="dist/hydra-sample-${TAG}.apk"
          cp sample/build/outputs/apk/release/sample-release.apk "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          sha256sum "$OUT"

      - name: Upload APK to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.stage.outputs.apk }}" --clobber

      - name: Upload APK as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: hydra-sample-apk
          path: ${{ steps.stage.outputs.apk }}
